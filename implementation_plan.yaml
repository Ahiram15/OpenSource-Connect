# OpenSource Connect - Implementation Plan & Git Guide
# This file is structured in YAML format for clean and easy reading.

Project_Overview: >
  OpenSource Connect is an AI-powered web platform that matches developers 
  with suitable open-source GitHub issues based on their profile, skills, and interests.
  It generates match scores, explanation summaries, and step-by-step learning roadmaps.

Technology_Stack:
  Frontend_Client:
    Framework: React.js (Vite)
    Styling: Tailwind CSS
    Analytics: Recharts (for language proficiency charts)
  Backend_Server:
    Framework: Node.js & Express.js
    Database: MongoDB
  APIs:
    GitHub_API: For authentication (OAuth) and issue fetching
    Google_Gemini_API: For generating match scores and learning roadmaps

Antigravity_AI_Instructions:
  Rule_1: Tell Antigravity the exact file path you want to modify or create.
  Rule_2: Specify that you are using React and Tailwind CSS in your prompt.
  Rule_3: Describe the UI design (e.g. "dark theme, glassmorphic card borders, purple button").

Git_and_GitHub_Step_by_Step_Guide:
  Step_1_Tools:
    Install: Git (from git-scm.com)
    Identity_Configuration: |
      git config --global user.name "Your Name"
      git config --global user.email "your.email@example.com"
  Step_2_Clone_Repository:
    Command: git clone https://github.com/Ahiram15/OpenSource-Connect.git
  Step_3_Create_Feature_Branch:
    Partner_1_Branch: git checkout -b feature/frontend-user-space
    Partner_2_Branch: git checkout -b feature/frontend-issues
  Step_4_Daily_Save_and_Push:
    Stage_Changes: git add .
    Commit_Save: git commit -m "feat: Add buttons and styles"
    Push_Upload: git push origin feature/your-branch-name
  Step_5_Pull_Updates_from_Partner:
    Switch_to_Main: git checkout main
    Download_Latest: git pull origin main
    Return_to_Branch: git checkout feature/your-branch-name
    Merge_Main: git merge main
  Step_6_Resolve_Conflicts:
    Action: Open conflicting file in VS Code, choose Current or Incoming change, save, then commit.

Frontend_Phase_1_Task_Division:
  Partner_1_UI_Pages:
    - Login Screen (Login.jsx)
    - Dashboard Analytics (Dashboard.jsx)
    - Profile settings checklist (Profile.jsx)
  Partner_2_UI_Pages:
    - Issue recommendations feed list (IssueList.jsx)
    - Sidebar search and filters (Language & Difficulty)
    - AI Roadmap learning checklists (IssueDetail.jsx)

Backend_Phase_2_Task_Division:
  Partner_1_Server_APIs:
    - Express server index.js boilerplate setup
    - MongoDB Mongoose database schemas
    - GitHub OAuth callback validation endpoints
  Partner_2_Server_APIs:
    - GitHub API issue fetcher services
    - Gemini API match scoring and roadmap prompts integration
    - REST routes (GET /api/recommendations)

Frontend_Backend_Mock_Data_Contract:

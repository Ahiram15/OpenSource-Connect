Tips_to_Stay_Consistent:
  Design_System_Colors:
    --bg-dark: "#0b0f19"
    --surface: "#1e293b"
    --primary: "#6366f1"
    --success: "#10b981"
    --warning: "#f59e0b"
  Guidelines:
    - Keep task.md updated daily (use [/] for progress, [x] for complete).
    - Spend 5 minutes every day syncing on tasks and blockers.
